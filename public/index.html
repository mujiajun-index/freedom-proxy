<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>freedomProxy 管理后台</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">freedomProxy <span class="brand-sub">管理后台</span></div>
    <div class="topbar-right">
      <span id="userBadge" class="badge"></span>
      <button id="logoutBtn" class="btn btn-ghost" type="button">退出登录</button>
    </div>
  </header>

  <!-- 登录视图 -->
  <main id="loginView" class="center-card">
    <form id="loginForm" class="card">
      <h1>登录</h1>
      <p class="muted">freedomProxy 管理后台</p>
      <label>账号<input type="text" id="username" required autocomplete="username" /></label>
      <label>密码<input type="password" id="password" required autocomplete="current-password" /></label>
      <button class="btn btn-primary" type="submit">登录</button>
      <p id="loginError" class="error" hidden></p>
    </form>
  </main>

  <!-- 主视图 -->
  <main id="appView" hidden>
    <nav class="tabs">
      <button class="tab active" data-tab="mappings">代理映射</button>
      <button class="tab" data-tab="whitelist">IP 白名单</button>
      <button class="tab" data-tab="logs">访问日志</button>
    </nav>

    <!-- 代理映射 -->
    <section id="tab-mappings" class="panel">
      <div class="panel-head">
        <h2>代理映射</h2>
        <button class="btn btn-primary" id="addMappingBtn" type="button">+ 新增映射</button>
      </div>
      <div class="table-wrap">
        <table class="grid">
          <thead>
            <tr>
              <th>启用</th><th>路径前缀</th><th>目标地址</th><th>备注</th><th class="col-ops">操作</th>
            </tr>
          </thead>
          <tbody id="mappingsBody">
            <tr><td colspan="5" class="muted">加载中…</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <!-- IP 白名单 -->
    <section id="tab-whitelist" class="panel" hidden>
      <div class="panel-head"><h2>IP 白名单</h2></div>
      <p class="muted">多个用英文分号 <code>;</code> 分隔，支持单 IP 与 CIDR（如 <code>192.168.1.10;10.0.0.0/24</code>）。留空表示不限制。</p>
      <label class="block">白名单
        <textarea id="whitelistInput" rows="3" placeholder="192.168.1.10;10.0.0.0/24"></textarea>
      </label>
      <div class="row">
        <button class="btn btn-primary" id="saveWhitelistBtn" type="button">保存</button>
        <span id="whitelistMsg" class="muted"></span>
      </div>
    </section>

    <!-- 访问日志 -->
    <section id="tab-logs" class="panel" hidden>
      <div class="panel-head">
        <h2>访问日志</h2>
        <div class="row">
          <a class="btn btn-ghost" id="exportLogsBtn" href="#" target="_blank">导出</a>
          <button class="btn btn-danger" id="clearLogsBtn" type="button">清空</button>
        </div>
      </div>
      <form id="logFilter" class="filter-row">
        <label>IP<input type="text" id="f-ip" placeholder="如 203.0.113.5" /></label>
        <label>路径<input type="text" id="f-path" placeholder="包含" /></label>
        <label>状态<input type="text" id="f-status" placeholder="如 502" /></label>
        <label>映射<input type="text" id="f-mapping" placeholder="/openai" /></label>
        <label>数量<input type="number" id="f-limit" value="200" min="1" max="1000" /></label>
        <button class="btn btn-primary" type="submit">查询</button>
      </form>
      <div class="table-wrap">
        <table class="grid">
          <thead>
            <tr><th>时间</th><th>IP</th><th>方法</th><th>路径</th><th>状态</th><th>耗时</th><th>映射</th><th>目标</th></tr>
          </thead>
          <tbody id="logsBody">
            <tr><td colspan="8" class="muted">点击「查询」加载</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <!-- 映射编辑弹窗 -->
  <div id="modal" class="modal" hidden>
    <div class="modal-card">
      <h2 id="modalTitle">新增映射</h2>
      <form id="mappingForm">
        <input type="hidden" id="m-id" />
        <label class="block">路径前缀（如 <code>/openai</code>）
          <input type="text" id="m-prefix" required placeholder="/openai" />
        </label>
        <label class="block">目标地址（如 <code>https://api.openai.com</code>）
          <input type="text" id="m-target" required placeholder="https://api.openai.com" />
        </label>
        <label class="block">备注
          <input type="text" id="m-note" placeholder="可选" />
        </label>
        <label class="check"><input type="checkbox" id="m-enabled" checked /> 启用</label>
        <p id="modalError" class="error" hidden></p>
        <div class="row right">
          <button type="button" class="btn btn-ghost" id="modalCancel">取消</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast" class="toast" hidden></div>
  <script src="./app.js"></script>
</body>
</html>
